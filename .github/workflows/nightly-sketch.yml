name: Test Hand Sketch

# Manual run to test hand-drawn sketch image generation
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Scene prompt for the hand sketch'
        required: false
        type: string
        default: 'every night in my dreams'

jobs:
  sketch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core fonts-liberation2
          pip install Pillow numpy opencv-python-headless requests python-dotenv

      - name: Create .env
        run: echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env

      - name: Generate test hand-sketch image
        env:
          PROMPT: ${{ inputs.prompt || 'every night in my dreams' }}
        run: python sketch_test.py

      - name: Upload sketch image
        uses: actions/upload-artifact@v4
        with:
          name: hand-sketch-test-${{ github.run_id }}
          path: hand_sketch_test.png
          retention-days: 7
          if-no-files-found: error
