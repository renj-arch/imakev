name: 🎬 Sketch-Story Video

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Story script (leave blank for built-in pirate story)'
        required: false
        type: string
        default: ''

jobs:
  story:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core fonts-liberation2 ffmpeg

      - name: Install Python deps
        run: pip install Pillow numpy moviepy edge-tts python-dotenv openai

      - name: Set up LLM env
        run: |
          echo "LLM_PROVIDER=${{ vars.LLM_PROVIDER || 'openrouter' }}" >> .env
          echo "LLM_API_KEY=${{ secrets.LLM_API_KEY }}" >> .env
          echo "LLM_MODEL=${{ vars.LLM_MODEL || 'moonshotai/kimi-k2.6:free' }}" >> .env

      - name: Write custom script if provided
        if: inputs.script != ''
        run: |
          cat > custom_script.txt << 'SCRIPTEOF'
          ${{ inputs.script }}
          SCRIPTEOF

      - name: Generate story video
        run: |
          if [ -f custom_script.txt ]; then
            python story_video.py custom_script.txt
          else
            python story_video.py
          fi

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: sketch-story-video
          path: output/story_*.mp4
          retention-days: 30
          if-no-files-found: error
