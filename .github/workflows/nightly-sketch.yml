name: 🎬 Auto Story Video

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic for the documentary (e.g., "how the printing press changed the world")'
        required: false
        type: string
      script_file:
        description: 'Path to a pre-written JSON script file in the repo (e.g., pirate_story.json)'
        required: false
        type: string
      title:
        description: 'Custom title (overrides script title)'
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core fonts-liberation2 ffmpeg

      - name: Install Python deps
        run: pip install Pillow numpy moviepy edge-tts python-dotenv openai opencv-python

      - name: Set up .env
        run: |
          echo "LLM_PROVIDER=${{ vars.LLM_PROVIDER || 'openrouter' }}" >> .env
          echo "LLM_API_KEY=${{ secrets.LLM_API_KEY }}" >> .env
          echo "LLM_MODEL=${{ vars.LLM_MODEL || 'moonshotai/kimi-k2.6:free' }}" >> .env
          echo "TTS_PROVIDER=edge" >> .env
          echo "VIDEO_WIDTH=720" >> .env
          echo "VIDEO_HEIGHT=1280" >> .env
          echo "VIDEO_FPS=24" >> .env

      - name: Generate video
        run: |
          if [ -n "${{ inputs.script_file }}" ]; then
            echo "Using pre-written script: ${{ inputs.script_file }}"
            python auto_story.py "${{ inputs.script_file }}"
          elif [ -n "${{ inputs.topic }}" ]; then
            echo "Generating from topic: ${{ inputs.topic }}"
            python auto_story.py "${{ inputs.topic }}"
          else
            echo "No input provided. Use topic or script_file."
            exit 1
          fi

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: auto-story-video
          path: output/auto_story_*.mp4
          retention-days: 30
          if-no-files-found: error
