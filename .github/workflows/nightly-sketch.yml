name: 🎨 Hand-Drawn Sketch

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'What to draw'
        required: true
        type: string

jobs:
  sketch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core fonts-liberation2
          pip install Pillow numpy python-dotenv openai

      - name: Set up LLM env
        run: |
          echo "LLM_PROVIDER=${{ vars.LLM_PROVIDER || 'openrouter' }}" >> .env
          echo "LLM_API_KEY=${{ secrets.LLM_API_KEY }}" >> .env
          echo "LLM_MODEL=${{ vars.LLM_MODEL || 'moonshotai/kimi-k2.6:free' }}" >> .env

      - name: Generate hand-drawn sketch
        run: python sketch_pipeline.py "${{ inputs.prompt }}"

      - name: Upload sketch
        uses: actions/upload-artifact@v4
        with:
          name: hand-drawn-sketch
          path: sketch_*.png
          retention-days: 7
          if-no-files-found: error
