name: 🎬 Auto Story Video

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'What should the story be about?'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core fonts-liberation2 ffmpeg

      - name: Install Python deps
        run: pip install Pillow numpy moviepy edge-tts python-dotenv openai

      - name: Set up LLM env
        run: |
          echo "LLM_PROVIDER=${{ vars.LLM_PROVIDER || 'openrouter' }}" >> .env
          echo "LLM_API_KEY=${{ secrets.LLM_API_KEY }}" >> .env
          echo "LLM_MODEL=${{ vars.LLM_MODEL || 'moonshotai/kimi-k2.6:free' }}" >> .env

      - name: Generate full story video
        run: python auto_story.py "${{ inputs.topic }}"

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: auto-story-video
          path: output/auto_story_*.mp4
          retention-days: 30
          if-no-files-found: error
