name: 🎬 Sketch-Story Video

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode'
        required: true
        default: 'story'
        type: choice
        options:
          - story
          - sketch
      prompt:
        description: 'Custom prompt (sketch mode only)'
        required: false
        type: string
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core fonts-liberation2 ffmpeg

      - name: Install Python deps
        run: pip install Pillow numpy moviepy edge-tts python-dotenv openai

      - name: Set up LLM env
        run: |
          echo "LLM_PROVIDER=${{ vars.LLM_PROVIDER || 'openrouter' }}" >> .env
          echo "LLM_API_KEY=${{ secrets.LLM_API_KEY }}" >> .env
          echo "LLM_MODEL=${{ vars.LLM_MODEL || 'moonshotai/kimi-k2.6:free' }}" >> .env

      - name: Run story mode (12-scene pirate video)
        if: inputs.mode == 'story'
        run: python storyboard_anim.py

      - name: Run sketch mode
        if: inputs.mode == 'sketch'
        run: python sketch_pipeline.py "${{ inputs.prompt || 'a peaceful landscape' }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: |
            output/*.mp4
            sketch_*.png
          retention-days: 30
          if-no-files-found: error
