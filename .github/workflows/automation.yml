name: AI Video Automation

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Video mode'
        required: true
        default: 'auto'
        type: choice
        options:
            - auto
            - loop
            - story
            - facts
            - what_if
            - how_it_works
            - riddles
            - would_you_rather
            - history_minute
            - psychology
            - life_hacks
            - urban_legends
            - coincidences
            - unsolved_mysteries
            - movie_trivia
            - animal_kingdom
            - space_wonders
            - box_office
            - things_they_dont_teach
            - challenges
            - satisfying
            - negative_hooks
            - try_this
            - animation
            - explainer
            - cartoon
      prompt:
        description: 'Custom prompt (animation mode only)'
        required: false
        default: ''
        type: string


concurrency:
  group: video-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system deps (fonts + ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core fonts-liberation2 ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Decode credentials
        run: |
          echo "${{ secrets.CLIENT_SECRET_B64 }}" | base64 -d > client_secret.json
          echo "${{ secrets.TOKEN_PICKLE_B64 }}" | base64 -d > token.pickle

      - name: Create .env
        run: |
          cat > .env << EOF
          TTS_PROVIDER=edge
          VIDEO_WIDTH=720
          VIDEO_HEIGHT=1280
          VIDEO_FPS=24
          BRAND_NAME=${{ secrets.BRAND_NAME }}
          OPENROUTER_VIDEO_MODEL=kwaivgi/kling-v3.0-std
          HF_TOKEN=${{ secrets.HF_TOKEN }}
          EOF

      - name: Determine mode
        id: mode
        run: |
          MODE="${{ inputs.mode || 'auto' }}"
          if [ "$MODE" = "auto" ]; then
            HOUR=$(date -u +%-H)
            MIN=$(date -u +%-M)
              DAY=$(date -u +%-j)
              HOUR=$(date -u +%-H)
              MIN=$(date -u +%-M)
              MODES=("how_it_works" "facts" "what_if" "riddles" "history_minute" "psychology" "life_hacks" "urban_legends" "coincidences" "unsolved_mysteries" "movie_trivia" "animal_kingdom" "space_wonders" "box_office" "things_they_dont_teach" "challenges" "satisfying" "negative_hooks" "try_this" "animation" "explainer" "cartoon")
              SLOT=$(( DAY * 48 + HOUR * 2 + MIN / 30 ))
              MODE="${MODES[$((SLOT % ${#MODES[@]}))]}"
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "Running: $MODE"

      - name: Run pipeline
        run: |
          MODE=${{ steps.mode.outputs.mode }}
          PROMPT="${{ inputs.prompt }}"
          if [ "$MODE" = "animation" ] && [ -n "$PROMPT" ]; then
            python run_pipeline.py "$MODE" "$PROMPT"
          else
            python run_pipeline.py "$MODE"
          fi

      - name: Commit and push bank updates
        run: |
          git config user.name "renj-arch"
          git config user.email "renj-arch@users.noreply.github.com"
          git add bank/ story_state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No bank changes to commit"
          else
            git commit -m "Auto-update content bank [skip ci]"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
            git fetch origin main
            git rebase origin/main
            git push
          fi
