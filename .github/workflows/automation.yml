name: AI Video Automation

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Video mode'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - story
          - facts
          - what_if
          - how_it_works
          - riddles
          - would_you_rather
          - history_minute
          - psychology
          - life_hacks
          - urban_legends
          - coincidences
          - unsolved_mysteries
          - movie_trivia
          - animal_kingdom
          - space_wonders

concurrency:
  group: video-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core fonts-liberation2

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Decode credentials
        run: |
          echo "${{ secrets.CLIENT_SECRET_B64 }}" | base64 -d > client_secret.json
          echo "${{ secrets.TOKEN_PICKLE_B64 }}" | base64 -d > token.pickle

      - name: Create .env
        run: |
          cat > .env << EOF
          LLM_PROVIDER=openrouter
          LLM_MODEL=openrouter/free
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          TTS_PROVIDER=edge
          VIDEO_WIDTH=720
          VIDEO_HEIGHT=1280
          VIDEO_FPS=12
          EOF

      - name: Determine mode
        id: mode
        run: |
          MODE="${{ inputs.mode || 'auto' }}"
          if [ "$MODE" = "auto" ]; then
            HOUR=$(date -u +%-H)
            case $((HOUR % 15)) in
              0) MODE="story" ;;
              1) MODE="facts" ;;
              2) MODE="what_if" ;;
              3) MODE="how_it_works" ;;
              4) MODE="riddles" ;;
              5) MODE="would_you_rather" ;;
              6) MODE="history_minute" ;;
              7) MODE="psychology" ;;
              8) MODE="life_hacks" ;;
              9) MODE="urban_legends" ;;
              10) MODE="coincidences" ;;
              11) MODE="unsolved_mysteries" ;;
              12) MODE="movie_trivia" ;;
              13) MODE="animal_kingdom" ;;
              14) MODE="space_wonders" ;;
            esac
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "Running: $MODE"

      - name: Run pipeline
        run: python run_pipeline.py ${{ steps.mode.outputs.mode }}

      - name: Commit and push bank updates
        run: |
          git config user.name "renj-arch"
          git config user.email "renj-arch@users.noreply.github.com"
          git add bank/ story_state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No bank changes to commit"
          else
            git commit -m "Auto-update content bank [skip ci]"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
            git push
          fi
