name: Generate Video

on:
  workflow_dispatch:
    inputs:
      llm_provider:
        description: 'LLM provider (huggingface, openrouter, google)'
        required: false
        default: 'huggingface'
        type: choice
        options:
          - huggingface
          - openrouter
          - google
      mode:
        description: 'Video mode'
        required: true
        default: 'storyboard'
        type: choice
        options:
          - storyboard
          - textsync
          - sketch
          - facts
          - story
          - what_if
          - how_it_works
          - riddles
          - would_you_rather
          - history_minute
          - psychology
          - life_hacks
          - urban_legends
          - coincidences
          - unsolved_mysteries
          - movie_trivia
          - animal_kingdom
          - space_wonders
          - box_office
          - things_they_dont_teach
          - challenges
          - satisfying
          - negative_hooks
          - try_this
      topic:
        description: 'Story topic (for storyboard mode, e.g. how dogs were domesticated)'
        required: false
        type: string
        default: ''
      niche:
        description: 'Topic niche (for facts mode, e.g. space, animals, brain)'
        required: false
        type: string
        default: ''
      repeat:
        description: 'Number of videos to generate'
        required: false
        type: number
        default: 1
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read
  actions: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Decode YouTube credentials
        run: |
          echo "${{ secrets.CLIENT_SECRET_B64 }}" | base64 -d > client_secret.json
          echo "${{ secrets.TOKEN_PICKLE_B64 }}" | base64 -d > token.pickle

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            fonts-dejavu-core fonts-liberation fonts-noto \
            ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install diffusers transformers

      - name: Set up environment
        run: |
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "LLM_API_KEY=${{ secrets.LLM_API_KEY }}" >> .env
          echo "LLM_PROVIDER=${{ inputs.llm_provider || 'huggingface' }}" >> .env
          echo "HF_API_KEY=${{ secrets.HF_API_KEY }}" >> .env
          echo "BRAND_NAME=${{ vars.BRAND_NAME || 'Imakev' }}" >> .env
          echo "=== .env contents ==="
          cat .env

      - name: Debug environment
        run: |
          python -c "
          import os
          print('LLM_PROVIDER=' + os.environ.get('LLM_PROVIDER', '(not set)'))
          print('HF_API_KEY set=' + ('yes' if os.environ.get('HF_API_KEY') else 'no'))
          print('LLM_API_KEY set=' + ('yes' if os.environ.get('LLM_API_KEY') else 'no'))
          "
      - name: Generate video(s)
        env:
          LLM_PROVIDER: ${{ inputs.llm_provider || 'huggingface' }}
        run: |
          MODE="${{ inputs.mode || 'sketch' }}"
          REPEAT="${{ inputs.repeat || 1 }}"

          for i in $(seq 1 $REPEAT); do
            echo "=== Generating video $i of $REPEAT (mode: $MODE) ==="
            case "$MODE" in
              sketch)
                python sketch_video.py
                ;;
              textsync)
                python textsync_video.py
                ;;
              storyboard)
                python storyboard_video.py "${{ inputs.topic }}"
                ;;
              *)
                python run_pipeline.py "$MODE"
                ;;
            esac
          done

      - name: Upload video artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-videos-${{ github.run_id }}
          path: output/*.mp4
          retention-days: 30
          if-no-files-found: error
